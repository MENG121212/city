<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>城市人格测试 · 你属于哪座城</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", -apple-system, sans-serif;
  background: #faf5ef;
  color: #2a2528;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

.container { max-width: 640px; margin: 0 auto; padding: 0 0 16px; }

/* ===== Hero ===== */
.hero {
  background: linear-gradient(160deg, #1e2330 0%, #2a3040 40%, #1e2330 100%);
  padding: 48px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -80px; right: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  background: rgba(196,147,106,0.08);
}
.hero::after {
  content: ''; position: absolute; bottom: -50px; left: -40px;
  width: 150px; height: 150px; border-radius: 50%;
  background: rgba(196,147,106,0.05);
}
.hero-badge {
  display: inline-block; background: rgba(196,147,106,0.18);
  color: #c4936a; font-size: 10px; font-weight: 700; letter-spacing: 3px;
  padding: 4px 16px; border-radius: 20px; margin-bottom: 16px;
  text-transform: uppercase;
}
.hero h1 {
  font-size: 26px; font-weight: 300; color: #e8ddd0; letter-spacing: 6px;
  margin-bottom: 8px; position: relative; z-index: 1;
}
.hero h1 span { font-weight: 700; color: #c4936a; }
.hero .hero-sub {
  font-size: 12px; color: rgba(232,221,208,0.55); font-weight: 400;
  position: relative; z-index: 1; letter-spacing: 1px;
}

/* ===== Progress ===== */
.progress-wrap {
  background: #fff; border-radius: 12px; margin: -16px 16px 16px;
  padding: 16px 20px; box-shadow: 0 2px 16px rgba(30,35,48,0.04);
  position: relative; z-index: 2; display: flex; align-items: center; gap: 14px;
}
.progress-bar {
  flex: 1; height: 4px; background: #ede6dc; border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #c4936a, #d4a880);
  border-radius: 4px; transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
}
.progress-num { font-size: 12px; font-weight: 700; color: #c4936a; min-width: 42px; text-align: right; }

/* ===== Intro ===== */
.intro-card { background: #fff; border-radius: 14px; padding: 24px 20px; margin: 0 16px 0; box-shadow: 0 1px 12px rgba(30,35,48,0.03); }
.intro-card h2 { font-size: 16px; font-weight: 700; color: #1e2330; margin-bottom: 6px; }
.intro-card .intro-p { font-size: 13px; color: #6a5e58; line-height: 1.7; }
.intro-highlights { display: flex; gap: 10px; margin-top: 16px; }
.intro-hl {
  flex: 1; background: #faf5ef; border-radius: 10px; padding: 12px 8px; text-align: center;
}
.intro-hl .hl-num { font-size: 18px; font-weight: 700; color: #c4936a; }
.intro-hl .hl-lab { font-size: 10px; color: #8a7a70; margin-top: 2px; }

/* ===== Buttons ===== */
.btn {
  display: inline-block; padding: 11px 32px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer; outline: none;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.5px; -webkit-tap-highlight-color: transparent;
}
.btn-primary {
  background: #1e2330; color: #e8ddd0; box-shadow: 0 3px 16px rgba(30,35,48,0.18);
  font-size: 15px; padding: 13px 48px; letter-spacing: 1px;
}
.btn-primary:hover { background: #2a3040; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost {
  background: transparent; color: #6a5e58; border: 1.5px solid #e0d4c8;
  padding: 10px 28px; font-size: 13px;
}
.btn-ghost:hover { border-color: #c4936a; color: #c4936a; background: #fdfaf7; }

/* ===== Question ===== */
.q-card {
  background: #fff; border-radius: 14px; padding: 22px 20px;
  margin: 0 16px 14px; box-shadow: 0 1px 12px rgba(30,35,48,0.03);
  transition: box-shadow 0.2s;
}
.q-card:hover { box-shadow: 0 3px 18px rgba(30,35,48,0.06); }
.q-label { font-size: 10px; color: #c4936a; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.q-title { font-size: 15px; font-weight: 600; color: #1e2330; margin-bottom: 16px; line-height: 1.5; }
.opt-list { display: flex; flex-direction: column; gap: 8px; }
.opt-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  border-radius: 10px; cursor: pointer; transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
  border: 1.5px solid #ede6dc; background: #fdfbf8;
  outline: none; text-align: left; font-size: 13px; color: #4a3e38;
  font-family: inherit; width: 100%;
}
.opt-item:hover { border-color: #d4b898; background: #fdf9f5; }
.opt-item.selected {
  border-color: #c4936a; background: #fdf7f1;
  color: #2a2528; font-weight: 500;
}
.opt-idx {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; background: #ede6dc; color: #8a7a70;
  transition: all 0.18s;
}
.opt-item.selected .opt-idx { background: #c4936a; color: #fff; }

/* ===== Page Nav ===== */
.page-nav { display: flex; justify-content: space-between; align-items: center; margin: 6px 16px 16px; }
.page-nav .page-hint { font-size: 12px; color: #a09088; font-weight: 500; }

/* ===== Submit ===== */
.submit-wrap { text-align: center; padding: 10px 0; }
.submit-hint {
  font-size: 12px; color: #c4936a; margin: 8px 16px; display: none;
  background: #fdf7f1; padding: 10px 16px; border-radius: 10px;
}

/* ===== Results ===== */
.result-hero {
  background: linear-gradient(160deg, #1e2330 0%, #2a3040 100%);
  padding: 40px 24px 44px; text-align: center;
}
.result-hero .rh-badge {
  display: inline-block; font-size: 10px; color: rgba(196,147,106,0.7);
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;
}
.result-hero .rh-city {
  font-size: 32px; font-weight: 300; color: #e8ddd0; letter-spacing: 4px;
  margin-bottom: 4px;
}
.result-hero .rh-city strong { font-weight: 700; color: #c4936a; }
.result-hero .rh-en {
  font-size: 11px; color: rgba(232,221,208,0.4); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 16px;
}
.match-circle {
  width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 8px;
  background: conic-gradient(#c4936a 0deg, #c4936a var(--pct), transparent var(--pct));
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.match-circle::after {
  content: ''; width: 64px; height: 64px; border-radius: 50%;
  background: #1e2330; position: absolute;
}
.match-val {
  position: relative; z-index: 1; font-size: 22px; font-weight: 700; color: #c4936a;
}
.match-lab {
  font-size: 10px; color: rgba(232,221,208,0.5); margin-top: 6px; letter-spacing: 1px;
}

.tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0 4px; }
.tag {
  display: inline-block; padding: 4px 14px; border-radius: 16px;
  font-size: 11px; font-weight: 600;
  border: 1px solid rgba(196,147,106,0.25);
  color: #c4936a; background: rgba(196,147,106,0.06);
}

.city-desc {
  background: #fff; border-radius: 14px; padding: 20px;
  margin: 0 16px 14px; box-shadow: 0 1px 12px rgba(30,35,48,0.03);
  font-size: 13px; color: #5a4e48; line-height: 1.8;
}

.tips-card {
  background: #fff; border-radius: 14px; padding: 20px;
  margin: 0 16px 14px; box-shadow: 0 1px 12px rgba(30,35,48,0.03);
}
.tips-card h3 { font-size: 14px; font-weight: 700; color: #1e2330; margin-bottom: 12px; }
.tip-row {
  display: flex; align-items: flex-start; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid #f5eee6; font-size: 12px; color: #5a4e48;
}
.tip-row:last-child { border-bottom: none; }
.tip-icon {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; background: #faf5ef; color: #c4936a; font-weight: 700;
}

.other-cities {
  background: #fff; border-radius: 14px; padding: 20px;
  margin: 0 16px 16px; box-shadow: 0 1px 12px rgba(30,35,48,0.03);
}
.other-cities h3 { font-size: 14px; font-weight: 700; color: #1e2330; margin-bottom: 10px; }
.oc-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5eee6; font-size: 12px; }
.oc-row:last-child { border-bottom: none; }
.oc-bar-wrap { flex: 1; height: 5px; background: #ede6dc; border-radius: 5px; overflow: hidden; }
.oc-bar { height: 100%; border-radius: 5px; background: #c4936a; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.oc-pct { font-size: 11px; color: #8a7a70; font-weight: 600; min-width: 36px; text-align: right; }

.final-actions { text-align: center; padding: 10px 0 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.disclaimer { text-align: center; padding: 0 16px; font-size: 9px; color: #c0b0a8; line-height: 1.6; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.anim { animation: fadeUp 0.55s cubic-bezier(0.4,0,0.2,1) both; }
.anim-d1 { animation-delay: 0.05s; }
.anim-d2 { animation-delay: 0.12s; }
.anim-d3 { animation-delay: 0.2s; }

/* ===== Responsive ===== */
@media (max-width: 500px) {
  .hero { padding: 36px 18px 30px; }
  .hero h1 { font-size: 22px; letter-spacing: 4px; }
  .rh-city { font-size: 26px; }
  .q-card { padding: 18px 14px; margin: 0 10px 10px; }
  .opt-item { padding: 10px 12px; font-size: 12px; }
  .intro-card { margin: 0 10px 0; }
}

@media (prefers-color-scheme: dark) {
  body { background: #14161c; color: #d4c8c0; }
  .progress-wrap { background: #1c1e26; box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
  .progress-bar { background: #2a2c36; }
  .intro-card { background: #1c1e26; box-shadow: 0 1px 12px rgba(0,0,0,0.3); }
  .intro-card h2 { color: #e8ddd0; }
  .intro-card .intro-p { color: #a09088; }
  .intro-hl { background: #22242c; }
  .intro-hl .hl-lab { color: #908078; }
  .q-card { background: #1c1e26; box-shadow: 0 1px 12px rgba(0,0,0,0.3); }
  .q-title { color: #e8ddd0; }
  .opt-item { background: #1c1e26; border-color: #2a2c36; color: #b0a098; }
  .opt-item:hover { border-color: #5a4a38; background: #22242c; }
  .opt-item.selected { border-color: #c4936a; background: #222018; color: #d4c8c0; }
  .opt-idx { background: #2a2c36; color: #908078; }
  .city-desc { background: #1c1e26; color: #b0a098; box-shadow: 0 1px 12px rgba(0,0,0,0.3); }
  .tips-card { background: #1c1e26; box-shadow: 0 1px 12px rgba(0,0,0,0.3); }
  .tips-card h3 { color: #e8ddd0; }
  .tip-row { color: #b0a098; border-bottom-color: #2a2c36; }
  .tip-icon { background: #22242c; }
  .other-cities { background: #1c1e26; box-shadow: 0 1px 12px rgba(0,0,0,0.3); }
  .other-cities h3 { color: #e8ddd0; }
  .oc-row { border-bottom-color: #2a2c36; }
  .oc-bar-wrap { background: #2a2c36; }
  .oc-pct { color: #908078; }
  .btn-ghost { border-color: #2a2c36; color: #908078; }
  .btn-ghost:hover { border-color: #c4936a; color: #c4936a; background: #1c1e26; }
  .page-nav .page-hint { color: #808890; }
}
</style>
</head>

<div class="container">

<div class="hero">

  <p class="hero-sub">12 道题 · 发现你的城市灵魂</p>
</div>

<!-- Intro -->
<div id="page-intro">
  <div class="intro-card">
    <h2>每个人的气质，都有一座城市的灵魂与之呼应</h2>
    <p class="intro-p">有些人生来属于东京的克制与秩序，有人骨子里是巴塞罗那的热烈与自由。这个测试通过 12 个生活场景的选择，帮你找到最契合你的那座城。</p>
    <div class="intro-highlights">
      <div class="intro-hl"><div class="hl-num">9</div><div class="hl-lab">座城市</div></div>

      <div class="intro-hl"><div class="hl-num">2</div><div class="hl-lab">分钟完成</div></div>
    </div>
  </div>
  <div style="text-align:center;padding:18px 16px 24px;">
    <button class="btn btn-primary" onclick="start()">开始探索</button>
  </div>
</div>

<!-- Quiz -->
<div id="page-quiz" style="display:none;">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="bar-fill" style="width:0%"></div></div>
    <div class="progress-num" id="bar-num">0/12</div>
  </div>
  <div class="q-card" id="q-card"></div>
  <div class="page-nav">
    <button class="btn btn-ghost" id="btn-prev" onclick="nav(-1)">上一题</button>
    <span class="page-hint" id="page-hint"></span>
    <button class="btn btn-ghost" id="btn-next" onclick="nav(1)">下一题</button>
  </div>
</div>

<!-- Submit Page -->
<div id="page-submit" style="display:none;">
  <div class="intro-card" style="text-align:center;">
    <h2>准备就绪</h2>
    <p class="intro-p">全部 12 题已完成，点击下方查看你的城市人格</p>
    <p class="submit-hint" id="submit-hint"></p>
    <button class="btn btn-primary" onclick="submitTest()" style="margin-top:10px;">揭晓答案</button>
    <button class="btn btn-ghost" onclick="goBack()" style="margin-top:6px;">返回修改</button>
  </div>
</div>

<!-- Result -->
<div id="page-result" style="display:none;"><div id="result-content"></div></div>

<div class="disclaimer" style="padding:16px;">本测试为趣味心理游戏，结果仅供娱乐参考</div>

</div>

var answers = [], currentQ = 0;

function start(){
  answers = new Array(12).fill(-1); currentQ = 0;
  document.getElementById("page-intro").style.display="none";
  document.getElementById("page-submit").style.display="none";
  document.getElementById("page-result").style.display="none";
  document.getElementById("page-quiz").style.display="block";
  renderQ(0); window.scrollTo(0,0);
}

function renderQ(idx){
  currentQ = idx;
  var q = Q[idx], sel = answers[idx];
  var h = '<div class="q-label">Question '+(idx+1)+' / 12</div>';
  h += '<div class="q-title">'+q.t+'</div><div class="opt-list">';
  for(var i=0;i<q.o.length;i++){
    var cls = sel===i ? "opt-item selected" : "opt-item";
    var letters = ["A","B","C","D"];
    h += '<button class="'+cls+'" onclick="selectOpt('+idx+','+i+')"><span class="opt-idx">'+letters[i]+'</span>'+q.o[i]+'</button>';
  }
  h += '</div>';
  document.getElementById("q-card").innerHTML = h;
  document.getElementById("bar-fill").style.width = Math.round((idx+1)/12*100)+'%';
  document.getElementById("bar-num").textContent = (idx+1)+' / 12';
  document.getElementById("page-hint").textContent = '';
  var bp = document.getElementById("btn-prev");
  var bn = document.getElementById("btn-next");
  if(idx===0){ bp.style.visibility='hidden'; bn.textContent='下一题'; }
  else if(idx===11){ bp.style.visibility='visible'; bn.textContent='完成答题'; }
  else { bp.style.visibility='visible'; bn.textContent='下一题'; }
  window.scrollTo(0,80);
}

function selectOpt(qIdx,optIdx){
  answers[qIdx] = optIdx;
  renderQ(qIdx);
  var allDone=true;
  for(var i=0;i<12;i++){if(answers[i]===-1){allDone=false;break;}}
  document.getElementById("page-hint").textContent = allDone ? '全部完成，点击「完成答题」查看结果' : '';
}

function nav(dir){
  var nxt = currentQ + dir;
  if(dir===1 && currentQ===11){
    var u=[];
    for(var i=0;i<12;i++){if(answers[i]===-1)u.push(i+1);}
    document.getElementById("page-quiz").style.display="none";
    document.getElementById("page-submit").style.display="block";
    var hint=document.getElementById("submit-hint");
    if(u.length>0){ hint.style.display="block"; hint.textContent="第 "+u.join("、")+" 题未作答，可返回补充或直接提交"; }
    else { hint.style.display="none"; }
    window.scrollTo(0,0);
    return;
  }
  if(nxt>=0 && nxt<12) renderQ(nxt);
}

function goBack(){
  document.getElementById("page-submit").style.display="none";
  document.getElementById("page-quiz").style.display="block";
  renderQ(11);
}

function submitTest(){

  for(var i=0;i<12;i++){
    var idx=answers[i]; if(idx===-1)idx=0;
    var w=weights[i][idx];
    for(var j=0;j<9;j++)scores[j]+=w[j];
  }
  var max=0,mi=0;
  for(var j=0;j<9;j++){if(scores[j]>max){max=scores[j];mi=j;}}
  var total=0; for(var j=0;j<9;j++)total+=scores[j];
  var pct=Math.round(max/total*100);
  var city=cities[cityKeys[mi]];

  var ranked=[]; for(var j=0;j<9;j++)ranked.push({k:cityKeys[j],s:scores[j]}); ranked.sort(function(a,b){return b.s-a.s;});

  var h='';
  h+='<div class="result-hero"><div class="rh-badge">Your City</div>';
  h+='<div class="rh-city">你的灵魂属于<strong>'+city.name+'</strong></div>';
  h+='<div class="rh-en">'+city.en+'</div>';
  h+='<div class="match-circle" style="--pct:'+(pct/100*360)+'deg"><span class="match-val">'+pct+'%</span></div>';
  h+='<div class="match-lab">MATCH RATE</div>';
  h+='<div class="tag-wrap">';
  for(var t=0;t<city.tags.length;t++) h+='<span class="tag">'+city.tags[t]+'</span>';
  h+='</div></div>';

  h+='<div class="city-desc anim"><p>'+city.desc+'</p></div>';

  h+='<div class="tips-card anim anim-d1"><h3>生活共鸣</h3>';
  for(var t=0;t<city.tips.length;t++){
    h+='<div class="tip-row"><div class="tip-icon">'+(t+1)+'</div><div>'+city.tips[t]+'</div></div>';
  }
  h+='</div>';

  h+='<div class="other-cities anim anim-d2"><h3>完整排行</h3>';
  for(var r=0;r<ranked.length;r++){
    var rc=cities[ranked[r].k], rp=Math.round(ranked[r].s/total*100);

  }
  h+='</div>';

  h+='<div class="final-actions anim anim-d3"><button class="btn btn-primary" onclick="start()">重新测试</button></div>';

  document.getElementById("page-submit").style.display="none";
  document.getElementById("result-content").innerHTML=h;
  document.getElementById("page-result").style.display="block";
  window.scrollTo(0,0);
}
